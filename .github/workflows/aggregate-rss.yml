name: Aggregate RSS feeds

on:
  schedule:
    - cron: '0 * * * *'   # hourly
  workflow_dispatch:        # manual trigger for testing

permissions:
  contents: write

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install feedparser python-dateutil

      - name: Aggregate feeds
        run: python .github/scripts/aggregate.py

      - name: Commit if changed
        run: |
          git config user.name "rss-aggregator"
          git config user.email "actions@github.com"
          git add daily-feed.json
          git diff --staged --quiet || git commit -m "Update daily-feed.json"
          git push
